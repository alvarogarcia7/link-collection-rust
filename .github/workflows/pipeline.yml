name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install StrictDoc
        run: pip install strictdoc

      - name: Verify makefile structure
        run: make help

      - name: Check code formatting
        run: make format-check

      - name: Run clippy linter
        run: make clippy

      - name: Run tests
        run: make test

      - name: Validate StrictDoc requirements
        run: make strictdoc-validate

      - name: Generate documentation
        run: make doc

      - name: Build StrictDoc HTML documentation
        run: make strictdoc-build

      - name: Upload StrictDoc artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: strictdoc-export
          path: build/strictdoc
          retention-days: 30
